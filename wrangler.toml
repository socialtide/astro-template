name = "YOUR_NAME"
compatibility_date = "2024-03-25"

vars = { 'ENVIRONMENT' = 'dev' }

[env.staging]
name = "YOUR_NAME-staging"
routes = [{ pattern = "preview.yourdomain.com", custom_domain = true }]
vars = { 'ENVIRONMENT' = 'staging' }

# Ends up being what DNS is pointed to
[env.production]
name = "YOUR_NAME-production"
routes = [{ pattern = "yourdomain.com", custom_domain = true }]
vars = { 'ENVIRONMENT' = 'production' }

[assets]
directory = "./dist"
not_found_handling = "404-page"
