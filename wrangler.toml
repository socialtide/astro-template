name = "CLIENT_NAME"
compatibility_date = "2024-03-25"

vars = { 'ENVIRONMENT' = 'dev' }

[env.staging]
name = "CLIENT-staging"
routes = [{ pattern = "-preview.yourdomain.com/*", zone_name = "yourzone.com" }]
vars = { 'ENVIRONMENT' = 'staging' }

# Ends up being what DNS is pointed to
[env.production]
name = "CLIENT-production"
routes = [{ pattern = "yourdomain.com/*", zone_name = "yourzone.com" }]
vars = { 'ENVIRONMENT' = 'production' }

[assets]
directory = "./dist"
not_found_handling = "404-page"
