name = "CLIENT_NAME"
compatibility_date = "2024-03-25"

vars = { 'ENVIRONMENT' = 'dev' }

[env.staging]
name = "CLIENT-staging"
routes = [
  { pattern = "CLIENT-preview.socialtide.ai/*", zone_name = "socialtide.ai" },
]
vars = { 'ENVIRONMENT' = 'staging' }

# Ends up being what DNS is pointed to
[env.production]
name = "CLIENT-production"
routes = [{ pattern = "CLIENT.socialtide.ai/*", zone_name = "socialtide.ai" }]
vars = { 'ENVIRONMENT' = 'production' }

[assets]
directory = "./dist"
not_found_handling = "404-page"
